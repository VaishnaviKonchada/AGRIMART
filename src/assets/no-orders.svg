<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Subtle Drop Shadow -->
  <ellipse cx="100" cy="165" rx="60" ry="12" fill="#e2e8f0" opacity="0.6" />

  <!-- Box Interior -->
  <polygon points="60,90 140,90 120,130 80,130" fill="#cbd5e1" />
  
  <!-- Back Flap -->
  <polygon points="60,90 140,90 160,60 40,60" fill="#e2e8f0" />
  
  <!-- Back Flap Fold Line -->
  <line x1="60" y1="90" x2="140" y2="90" stroke="#f8fafc" stroke-width="2" />
  
  <!-- Front Body -->
  <polygon points="50,110 150,110 140,160 60,160" fill="#f8fafc" opacity="0.9"/>
  <!-- Base Body layer (behind flaps but in front of interior) -->
  <polygon points="40,90 160,90 140,160 60,160" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Leaf Logo / Graphic on Front of Box -->
  <g transform="translate(100, 130) scale(0.8)">
    <path d="M0,5 C0,5 15,-10 15,5 C15,20 0,5 0,5 Z" fill="#10b981" />
    <path d="M0,5 C0,5 -10,-5 -10,5 C-10,15 0,5 0,5 Z" fill="#34d399" />
  </g>
  
  <!-- Left Side Flap -->
  <polygon points="40,90 80,90 40,130 15,110" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Right Side Flap -->
  <polygon points="160,90 120,90 160,130 185,110" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Front Flap -->
  <polygon points="40,90 160,90 155,120 45,120" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Decorative Taping -->
  <rect x="90" y="105" width="20" height="15" fill="#fca5a5" opacity="0.3" rx="2" />
  
</svg>
